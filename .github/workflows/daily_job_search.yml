name: Daily Job Search

on:
  schedule:
    # 3:30 PM UTC = 9:00 PM IST
    - cron: '30 15 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        env:
          # ── Extraction ──────────────────────────────────────────
          SERPER_API_KEY:       ${{ secrets.SERPER_API_KEY }}
          APIFY_API_TOKEN:      ${{ secrets.APIFY_API_TOKEN }}
          # ── Evaluators (no Anthropic key needed) ────────────────
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GH_MODELS_API_KEY:    ${{ secrets.GH_MODELS_API_KEY }}
          TOGETHER_API_KEY:       ${{ secrets.TOGETHER_API_KEY }}
          MISTRAL_API_KEY:      ${{ secrets.MISTRAL_API_KEY }}
          # ── Email Dispatch ──────────────────────────────────────
          SENDER_EMAIL:         ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD:  ${{ secrets.SENDER_APP_PASSWORD }}
          RECEIVER_EMAIL:       ${{ secrets.RECEIVER_EMAIL }}
        run: python main.py

      - name: Upload Excel report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-job-report-${{ github.run_number }}
          path: data/*.xlsx
          retention-days: 7